<head>

  <title>Hello Rigo with Vanilla.js</title>
  <!--Bootstrap CSS-->

  <!-- Fontawesome is our recomended library for icons -->

<body>
  <!-- Write your HTML code here, you can delete everything withing the body tags -->

  <div class="container">
    <div class="row">
      <div class="col-6">
        <div class="card text-center justify-content-between mt-5 p-2 shadow-lg p-3 mb-5 bg-body-tertiary rounded-4 tarjeta"
          style="width: 20rem; height: 28rem;">

          <div class="palo align-self-start"></div>

          <div class="numero"></div>

          <div class="palo align-self-end"></div>

        </div>
      </div>
      <div class="col-6">
        <div class="mb-3 mt-5">
          <label class="form-label">Width</label>
          <input id="widthInput" type="number" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Height</label>
          <input id="heightInput" type="number" class="form-control">
        </div>
      </div>

      <div class="row">
        <div class="col-4">
          <div class="gap-2 col-6 mx-auto">

            <button type="button" class="btn btn-dark mt-3 updatecard">Update Card</button>

          </div>
        </div>
      </div>


      <script type="module" src="/app.js"></script>



</body>
