<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./assets/img/4geeks.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Rigo with Vanilla.js</title>
  <!--Bootstrap CSS-->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <!-- Fontawesome is our recomended library for icons -->
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.2.0/css/all.css"
    integrity="sha384-hWVjflwFxL6sNzntih27bfxkr27PmbbK/iSvJ+a4+0owXq79v+lsFkW54bOGbiDQ" crossorigin="anonymous" />
</head>

<body>

  <div class="container">

    <h1>JavaScript Card Generator</h1>
    <p>
      The card below changes randomly when the page loads, every 10 seconds, or when you click the button.
    </p>

    <div class="row justify-content-between">

      <div class="col-5">
        <div
          class="card text-center justify-content-between mt-5 p-2 shadow-lg p-3 mb-5 bg-body-tertiary rounded-4 tarjeta"
          style="width: 20rem; height: 28rem;">

          <div class="palo align-self-start"></div>

          <div class="numero"></div>

          <div class="palo align-self-end"></div>

        </div>
        <p>Current Card</p>

      </div>

      <div class="col-6">
        <div class="card mt-5 rounded-2" style="width: 18rem;">

          <div class="card-body">
            <h5 class="card-title">Card title</h5>
            <p class="card-text">Some quick example text to build on the card title and make up the bulk of the card’s
              content.</p>

            <label class="form-label">Width</label>
            <input id="widthInput" type="number" class="form-control">
            <div class="mb-3">
              <label class="form-label">Height</label>
              <input id="heightInput" type="number" class="form-control">
            </div>
            <button type="button" class="btn btn-dark mt-3 updatecard">Update Card</button>
          </div>
        </div>
      </div>
    </div>
  </div>



  <script type="module" src="/app.js"></script>



</body>
