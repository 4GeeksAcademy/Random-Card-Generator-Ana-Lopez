<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./assets/img/4geeks.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Rigo with Vanilla.js</title>
  <!--Bootstrap CSS-->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <!-- Fontawesome is our recomended library for icons -->
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.2.0/css/all.css"
    integrity="sha384-hWVjflwFxL6sNzntih27bfxkr27PmbbK/iSvJ+a4+0owXq79v+lsFkW54bOGbiDQ" crossorigin="anonymous" />
</head>

<body>

  <div class="container hv-100">

    <h1>JavaScript Card Generator</h1>
    <p>
      The card below changes randomly when the page loads, every 10 seconds, or when you click the button.
    </p>

    <div class="row mt-4=">

      <!-- CARD COLUMN -->
      <div class="col-5">
       
        <div
          class="card text-center justify-content-between mt-5 p-2 shadow-lg p-3 mb-5 bg-body-tertiary rounded-4 tarjeta"
          style="width: 20rem; height: 28rem;">

          <div class="palo align-self-start"></div>

          <div class="numero"></div>

          <div class="palo align-self-end"></div>

        </div>
        <p>Current Card</p>
        </div>

      

      <!-- SETTINGS COLUMN -->
      <div class="col-md-7">
        <div class="card mt-5 p-4 rounded-2 w-100">

          <div class="card-body">
            <h5 class="card-title">Card Settings</h5>
            <p class="card-text">Adjust the card width and height in pixels (px) using the controls below.</p>

            <div class="input-group mb-3">
              <span class="input-group-text">Width</span>
              <input id="widthInput" type="text" class="form-control">
              <span class="input-group-text">px</span>
            </div>

            <div class="input-group mb-3">
              <span class="input-group-text">Height</span>
              <input id="heightInput" type="text" class="form-control">
              <span class="input-group-text">px</span>
            </div>
            <div class="d-grid gap-2">
              <button class="btn btn-warning" id="applySize" type="button">Update Size</button>
            </div>
            <div class= "mt-3">
              <div class="alert alert-dark rounded-4 p-2 d-inline-block" role="alert">
                Auto refresh:10s
              </div>
            </div>
            <button type="button" class="btn btn-warning mt-2 updatecard">Change Card</button>
          </div>
        </div>
      </div>
    </div>
  </div>



  <script type="module" src="/app.js"></script>



</body>
